<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Your Cupcake - Velvet Crust Cakes</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('bg1.jpg') center/cover no-repeat;
  background-size: cover;
  color:#3a2e2a;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:#fff0dc;
}

.logo a{
  color:#c94c4c;
  text-decoration:none;
  font-weight:bold;
}

.nav-links button{
  background:none;
  border:none;
  color:#3a2e2a;
  margin:0 15px;
  cursor:pointer;
  font-size:15px;
}

.nav-links button:hover{
  color:#c94c4c;
}

.nav-right button{
  margin-left:10px;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.schedule-btn{
  background:#c94c4c;
  color:white;
}

/* DESIGN CARD */
.card {
  background: rgba(255, 244, 230, 0.6); /* glassmorphism cream */
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  text-align: center;
  width: 350px;
  margin: 50px auto;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
}

.card h4 {
  font-size: 26px;
  color: whitesmoke;
  font-weight: bold;
  -webkit-text-stroke: 1px black;
  margin-bottom: 15px;
}

.card p {
  font-size: 16px;
  color: #3a2e2a;
  margin-bottom: 20px;
}

form input, form select, form textarea {
  width: 90%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 12px;
  border: 1px solid #ccc;
  font-size: 16px;
}

form textarea {
  resize: none;
  height: 80px;
}

.btn {
  background-color: #fff4e6;
  color: #3a2e2a;
  padding: 12px 25px;
  margin-top: 10px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-weight: bold;
  font-size: 16px;
  transition: 0.3s;
}

.btn:hover {
  background-color: #f5e0cc;
  transform: scale(1.05);
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo"><a href="index.html">Velvet Crust Cakes</a></div>
    <div class="nav-links">
        <button onclick="window.location.href='orders.html'">Orders</button>
        <button onclick="window.location.href='design.html'">Design</button>
        <button onclick="window.location.href='pickup.html'">Pickup</button>
    </div>
    <div class="nav-right">
        <button class="schedule-btn" onclick="window.location.href='schedule.html'">Schedule</button>
        <button onclick="alert('Login not implemented')">Login</button>
    </div>
</nav>

<!-- DESIGN CARD -->
<div class="card">
  <h4>Design Your Cupcake</h4>
  <p>Tell us how you want your cupcake to look!</p>

  <form id="designForm">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Email Address" required>
    
    <select name="flavor" required>
      <option value="">Choose a Flavor</option>
      <option value="chocolate">Chocolate</option>
      <option value="vanilla">Vanilla</option>
      <option value="strawberry">Strawberry</option>
      <option value="red-velvet">Red Velvet</option>
    </select>

    <textarea name="design" placeholder="Describe your cupcake design" required></textarea>

    <button type="submit" class="btn">Submit Design</button>
  </form>

  <!-- Notification message -->
  <p id="notification" style="display:none; color:green; font-weight:bold; margin-top:15px;">Your cupcake request has been sent!</p>
</div>

<script>
  const form = document.getElementById('designForm');
  const notification = document.getElementById('notification');

  form.addEventListener('submit', function(e){
    e.preventDefault(); // prevent actual form submission
    notification.style.display = 'block'; // show notification

    // Optionally, reset the form
    form.reset();

    // Hide the notification after 4 seconds
    setTimeout(() => {
      notification.style.display = 'none';
    }, 4000);
  });
</script>
