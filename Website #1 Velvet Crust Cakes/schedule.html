<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule - Velvet Crust Cakes</title>

<style>
/* COLORS */
:root{
  --main-red:#c94c4c;
  --cream:#fff4e6;
  --soft-brown:#3a2e2a;
  --navbar-cream:#fff0dc;
}

/* RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('bg1.jpg') center/cover no-repeat;
  background-size: cover;
  color:#3a2e2a;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:var(--navbar-cream);
}

.logo a{
  text-decoration:none;
  color:var(--main-red);
  font-weight:bold;
  font-size:22px;
}

.nav-links button{
  background:none;
  border:none;
  color:var(--soft-brown);
  margin:0 15px;
  cursor:pointer;
}

.nav-links button:hover{
  color:var(--main-red);
}

.nav-right button{
  margin-left:10px;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.schedule-btn{
  background:var(--main-red);
  color:white;
}

/* SCHEDULE FORM - Glassmorphism */
.schedule-container{
  max-width:500px;
  margin:60px auto;
  background: rgba(255,244,230,0.6); /* semi-transparent cream */
  backdrop-filter: blur(10px); /* glass effect */
  padding:30px;
  border-radius:20px;
  box-shadow:0 8px 32px rgba(0,0,0,0.1);
  text-align:center;
}

.schedule-container h1{
  text-align:center;
  color: whitesmoke;
  -webkit-text-stroke: 1px black;
  margin-bottom:20px;
}

.schedule-container label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

.schedule-container input,
.schedule-container select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

/* BUTTON */
.confirm-btn{
  width:100%;
  margin-top:25px;
  padding:12px;
  background:var(--cream);
  color:#3a2e2a;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.confirm-btn:hover{
  background:#f5e0cc;
  transform: scale(1.05);
}

/* MESSAGE */
#scheduleMsg{
  text-align:center;
  margin-top:15px;
  font-weight:bold;
  color:green;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo"><a href="index.html">Velvet Crust Cakes</a></div>

    <div class="nav-links">
        <button onclick="window.location.href='orders.html'">Orders</button>
        <button onclick="window.location.href='design.html'">Design</button>
        <button onclick="window.location.href='pickup.html'">Pickup</button>
    </div>

    <div class="nav-right">
        <button class="schedule-btn" onclick="window.location.href='schedule.html'">Schedule</button>
        <button onclick="window.location.href='index.html'">Home</button>
    </div>
</nav>

<!-- SCHEDULE FORM -->
<div class="schedule-container">
  <h1>Book Your Schedule</h1>

  <form id="scheduleForm">

    <label>Full Name</label>
    <input type="text" id="name" required>

    <label>Contact Number</label>
    <input type="text" id="contact" required>

    <label>Pickup Date</label>
    <input type="date" id="date" required>

    <label>Pickup Time</label>
    <select id="time" required>
      <option value="">Select time</option>
      <option>9:00 AM</option>
      <option>11:00 AM</option>
      <option>1:00 PM</option>
      <option>3:00 PM</option>
      <option>5:00 PM</option>
    </select>

    <button type="submit" class="confirm-btn">Confirm Schedule</button>

  </form>

  <p id="scheduleMsg"></p>
</div>

<script>
document.getElementById("scheduleForm").addEventListener("submit", function(e){
    e.preventDefault();

    const name = document.getElementById("name").value;
    const date = document.getElementById("date").value;
    const time = document.getElementById("time").value;

    // Show a cute confirmation message
    const msg = document.getElementById("scheduleMsg");
    msg.textContent = "Scheduled for " + name + " on " + date + " at " + time + " 🎉";

    // Reset form
    this.reset();
});
</script>

</body>
</html>
