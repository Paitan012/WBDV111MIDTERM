<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bakery Orders - Velvet Crust Cakes</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('bg1.jpg') center/cover no-repeat;
  background-size: cover;
  color:#3a2e2a;
}

/* NAVBAR */
.navbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 60px;
  background:#fff0dc;
}

.logo a{
  color:#c94c4c;
  text-decoration:none;
  font-weight:bold;
}

.nav-links button{
  background:none;
  border:none;
  color:#3a2e2a;
  margin:0 15px;
  cursor:pointer;
  font-size:15px;
}

.nav-links button:hover{
  color:#c94c4c;
}

.nav-right button{
  margin-left:10px;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.schedule-btn{
  background:#c94c4c;
  color:white;
}

/* ORDERS LIST - Glassmorphism */
.orders-container{
  max-width:700px;
  margin:50px auto;
  background: rgba(255, 244, 230, 0.6); /* semi-transparent cream */
  backdrop-filter: blur(10px); /* glass effect */
  padding:30px;
  border-radius:20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  text-align:center;
}

.orders-container h1{
  color: whitesmoke;
  -webkit-text-stroke: 1px black;
  margin-bottom:20px;
}

.orders-container table{
  width:100%;
  border-collapse:collapse;
  margin-bottom:20px;
}

.orders-container table th, .orders-container table td{
  padding:12px;
  border-bottom:1px solid rgba(58,46,42,0.3); /* lighter for glass effect */
  text-align:left;
}

.orders-container input[type="number"]{
  width:50px;
  border-radius:8px;
  border:1px solid #ccc;
  padding:5px;
}

.finalize-btn{
  display:block;
  margin:0 auto;
  padding:12px 25px;
  background:#fff4e6;
  color:#3a2e2a;
  border:none;
  border-radius:12px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:0.3s;
}

.finalize-btn:hover{
  background:#f5e0cc;
  transform: scale(1.05);
}
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo"><a href="index.html">Velvet Crust Cakes</a></div>
    <div class="nav-links">
      <button onclick="window.location.href='orders.html'">Orders</button>
        <button onclick="window.location.href='design.html'">Design</button>
        <button onclick="window.location.href='pickup.html'">Pickup</button>
    </div>
    <div class="nav-right">
       <button class="schedule-btn" onclick="window.location.href='schedule.html'">Schedule</button>
        <button onclick="alert('Login not implemented')">Login</button>
    </div>
</nav>

<!-- ORDERS LIST -->
<div class="orders-container">
  <h1>Your Bakery Orders</h1>
  <table id="ordersTable">
    <thead>
      <tr>
        <th>Cake</th>
        <th>Quantity</th>
        <th>Remove</th>
      </tr>
    </thead>
    <tbody>
      <!-- Cart items will be inserted here -->
    </tbody>
  </table>
  <button class="finalize-btn" onclick="finalizeOrder()">Finalize Order</button>
  <p id="orderNotification" style="display:none; color:green; font-weight:bold; margin-top:15px;">Your order has been finalized!</p>
</div>

<script>
// Load cart from localStorage
let cart = JSON.parse(localStorage.getItem('cakeCart')) || [];

// Render cart keeping original order but group same cakes together
function renderCart(){
    const tbody = document.querySelector('#ordersTable tbody');
    tbody.innerHTML = "";

    if(cart.length === 0){
        const tr = document.createElement('tr');
        tr.innerHTML = `<td colspan="3">Your cart is empty!</td>`;
        tbody.appendChild(tr);
        return;
    }

    const seen = new Set();
    cart.forEach(cake => {
        if(seen.has(cake)) return;
        seen.add(cake);
        const qty = cart.filter(item => item === cake).length;

        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${cake}</td>
            <td><input type="number" min="1" value="${qty}" onchange="updateQuantity('${cake}', this.value)"></td>
            <td><button onclick="removeItem('${cake}')">Remove</button></td>
        `;
        tbody.appendChild(tr);
    });
}

function updateQuantity(cake, qty){
    qty = parseInt(qty);
    if(qty < 1) qty = 1;
    cart = cart.filter(item => item !== cake);
    for(let i=0;i<qty;i++) cart.push(cake);
    localStorage.setItem('cakeCart', JSON.stringify(cart));
    renderCart();
}

function removeItem(cake){
    cart = cart.filter(item => item !== cake);
    localStorage.setItem('cakeCart', JSON.stringify(cart));
    renderCart();
}

function finalizeOrder(){
    if(cart.length === 0){
        alert("Your cart is empty!");
        return;
    }
    const confirmation = confirm("Are you sure you want to finalize your order?");
    if(confirmation){
        const notification = document.getElementById('orderNotification');
        notification.style.display = 'block';
        setTimeout(() => { notification.style.display = 'none'; }, 4000);

        cart = [];
        localStorage.removeItem('cakeCart');
        renderCart();
    }
}

// Initial render
renderCart();
</script>

</body>
</html>
