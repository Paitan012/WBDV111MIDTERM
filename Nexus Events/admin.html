<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nexus Events | Admin Control</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Outfit:wght@400;600;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #ff4da6;
      --secondary: #00cfff;
      --accent: #ffd700;
      --bg: #fdf6f0;
      --card-bg: #ffffff;
      --text: #000000;
      --dark-border: #000;
    }

    /* Global Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Outfit', sans-serif; }

    body {
      /* KEPT THE IMAGE HERE: background: url('bg.jpg') */
      background: linear-gradient(rgba(253, 246, 240, 0.7), rgba(253, 246, 240, 0.5)), 
                  url('bg.jpg') no-repeat center center fixed;
      background-size: cover;
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }

    /* ===== NAVBAR ===== */
    header { 
      background-color: var(--accent); 
      border-bottom: 4px solid var(--dark-border); 
      padding: 0.5rem 0; 
      position: sticky; 
      top: 0; 
      z-index: 1000; 
    }
    
    .navbar-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand { 
      font-family: 'Baloo 2'; 
      font-size: 2.5rem; 
      font-weight: 800; 
      color: var(--secondary); 
      text-shadow: 2px 2px 0 #000; 
    }

    nav a { 
      margin-left: 0.8rem; 
      padding: 0.5rem 1rem; 
      background: #fff; 
      color: var(--primary); 
      font-weight: 800; 
      border: 2px solid var(--dark-border); 
      border-radius: 8px; 
      text-transform: uppercase;
      font-size: 0.9rem;
      transition: 0.1s;
    }
    nav a:hover { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 #000; }
    nav a.active { background: var(--primary); color: #fff; }

    /* ===== HERO SECTION ===== */
    .admin-hero {
      display: flex;
      flex-wrap: wrap;
      gap: 3rem;
      padding: 4rem 1.5rem;
      max-width: 1200px;
      margin: 0 auto;
      align-items: center;
    }

    .hero-content { flex: 1 1 500px; }

    .hero-content h1 {
      font-family: 'Baloo 2';
      font-size: 3.5rem;
      color: var(--primary);
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    .hero-content p { font-size: 1.2rem; font-weight: 600; margin-bottom: 1.5rem; }

    .tag {
      display: inline-block;
      padding: 0.4rem 1rem;
      background: var(--accent);
      border: 2px solid var(--dark-border);
      font-weight: 900;
      border-radius: 50px;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    .custom-hr {
      display: block;
      margin-top: 2rem;
      width: 100%;
      border: 4px solid var(--dark-border);
      border-radius: 10px;
      box-shadow: 6px 6px 0 var(--secondary);
    }

    /* ===== LOGIN CARD ===== */
    .admin-login-card {
      flex: 1 1 400px;
      background: var(--card-bg);
      padding: 3rem;
      border-radius: 30px;
      border: 4px solid var(--dark-border);
      box-shadow: 12px 12px 0 var(--accent);
    }

    .hint-box {
      background: #f0faff;
      border: 2px dashed var(--secondary);
      padding: 1rem;
      border-radius: 15px;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
      font-weight: 600;
    }

    .admin-login-card h2 {
      font-family: 'Baloo 2';
      font-size: 2.2rem;
      margin-bottom: 1.5rem;
      color: var(--secondary);
      text-shadow: 1px 1px 0 #000;
    }

    .form-grid { display: flex; flex-direction: column; gap: 1.2rem; }

    label { font-weight: 900; text-transform: uppercase; font-size: 0.8rem; display: block; margin-bottom: 0.4rem; }

    input {
      width: 100%;
      padding: 1rem;
      border: 3px solid var(--dark-border);
      border-radius: 12px;
      font-weight: 600;
      font-size: 1rem;
      outline: none;
    }
    input:focus { border-color: var(--primary); }

    button {
      padding: 1.2rem;
      font-weight: 900;
      font-size: 1.1rem;
      background: var(--primary);
      color: #fff;
      border: 3px solid var(--dark-border);
      box-shadow: 6px 6px 0 #000;
      border-radius: 15px;
      cursor: pointer;
      text-transform: uppercase;
      transition: 0.1s;
    }

    button:hover {
      transform: translate(-3px, -3px);
      box-shadow: 9px 9px 0 var(--secondary);
    }

    /* ===== FOOTER ===== */
    footer {
      margin-top: auto;
      padding: 3rem;
      text-align: center;
      background: #000;
      color: #fff;
      font-weight: 800;
      border-top: 4px solid var(--primary);
    }
  
  .nav-logo-img {
    height: 60px; /* Adjust height based on your preference */
    width: auto;
    object-fit: contain;
    border-radius: 50%; /* This creates the circular effect */
    border: 3px solid var(--dark-border); /* Adds a heavy black border to match the aesthetic */
    box-shadow: 2px 2px 0 var(--secondary); /* Small offset shadow to make it pop */
    margin-right: 15px; /* Adds spacing between the logo and the brand name */
}

/* Updated brand styling to handle alignment */
.brand {
    display: flex;
    align-items: center; /* Centers image and text vertically */
}
  </style>
</head>

<body>

  <header>
    <div class="container navbar">
        <a href="index.html" class="brand">
            <img src="logo.png" alt="Nexus Events Logo" class="nav-logo-img">
            <span>Nexus Events</span>
        </a>
        <nav>
            <a href="index.html" class="active">Home</a>
            <a href="index.html#eventss">Events</a>
            <a href="tickets.html">Tickets</a>
            <a href="venue.html">Venue</a>
            <a href="admin.html">Admin</a>
        </nav>
    </div>
</header>

  <main>
    <section class="admin-hero">
      <div class="hero-content">
        <h1>Admin Control Room</h1>
        <p>Authorized team only. Manage events, tickets, and stadium operations.</p>
        <div class="tag-row">
          <span class="tag">Events</span>
          <span class="tag">Tickets</span>
          <span class="tag">Venue</span>
          <span class="tag">Inbox</span>
        </div>
        <img src="hr.jpg" alt="Divider" class="custom-hr">
      </div>

      <div class="admin-login-card">
        <h2>Admin Login</h2>

        <div class="hint-box">
          <strong>SYSTEM_HINT:</strong><br>
          USER: admin@gmail.com<br>
          PASS: admin123
        </div>

        <form class="form-grid" id="admin-login-form">
          <div>
            <label>Admin ID</label>
            <input type="text" id="admin-user" placeholder="Enter ID" required>
          </div>
          <div>
            <label>Password</label>
            <input type="password" id="admin-pass" placeholder="••••••••" required>
          </div>
          <button type="submit">Enter Dashboard</button>
        </form>
      </div>
    </section>
  </main>

  <footer>
    Nexus Events · © <span id="year"></span>
  </footer>

  <script>
    const form = document.getElementById("admin-login-form");

    form.addEventListener("submit", function(e) {
      e.preventDefault();
      
      const user = document.getElementById("admin-user").value;
      const pass = document.getElementById("admin-pass").value;

      // Logic check before redirect
      if (user === "admin@gmail.com" && pass === "admin123") {
        window.location.href = "aindex.html"; 
      } else {
        alert("ACCESS DENIED: Credentials Invalid.");
      }
    }); 

    // YEAR
    document.getElementById("year").textContent = new Date().getFullYear();
  </script>

</body>
</html>
