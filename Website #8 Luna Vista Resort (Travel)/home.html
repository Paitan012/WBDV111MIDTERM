<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Booking Dates | Luna Vista Resort</title>
<link rel="stylesheet" href="home.css">
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="resort-video.mp4" type="video/mp4">
  Your browser does not support HTML5 video.
</video>

<!-- NAVBAR -->
<header class="navbar">
  <nav class="navbar-container">
    <img src="logo.png" class="ilogo">
    <span class="logo">Luna Vista Resort</span>
  </nav>
</header>

<!-- HERO TEXT -->
<section class="hero-text">
  <div class="hero-content">
    <h1>Choose Your Stay Dates</h1>
    <p>Select your preferred check-in and check-out dates to see available rooms and start your booking journey.</p>
  </div>
</section>

<!-- DATES SELECTION FORM -->
<section class="dates-section">
  <div class="dates-bar">
    <h2>Booking Dates</h2>
    <form id="datesForm">
      <label for="checkin">Check-in Date</label>
      <input type="date" id="checkin" name="checkin" required>

      <label for="checkout">Check-out Date</label>
      <input type="date" id="checkout" name="checkout" required>

      <button type="submit">Next: Select Room</button>
    </form>
  </div>
</section>

<script>
  const form = document.getElementById('datesForm');
  form.addEventListener('submit', function(e){
    e.preventDefault();
    // You can store dates in localStorage or send to backend here
    const checkin = document.getElementById('checkin').value;
    const checkout = document.getElementById('checkout').value;

    if(!checkin || !checkout) {
      alert("Please select both check-in and check-out dates.");
      return;
    }

    // Redirect to room selection page
    window.location.href = 'rooms.html';
  });
</script>

</body>
</html>
