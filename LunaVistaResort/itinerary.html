<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Itinerary | Luna Vista Resort</title>
<style>
/* ---------------- BACKGROUND VIDEO ---------------- */
.bg-video {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  filter: blur(5px) brightness(0.6);
  z-index: -1;
}

.ilogo{
  width:50px; height:50px;
  margin-right: -40px;
}

/* ---------------- NAVBAR ---------------- */
.navbar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(5px);
  z-index: 10;
  padding: 15px 40px;
}
.navbar-container {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 30px;
  flex-wrap: wrap;
}
.navbar-container a {
  color: white;
  text-decoration: none;
  font-size: 16px;
  font-weight: 600;
  font-family: 'Poppins', sans-serif;
}
.navbar-container a:hover { color: #f5deb3; }
.logo {
  color: white;
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 2px;
  font-family: 'Playfair Display', serif;
}

.ilogo{
  width:50px; height:50px;
  margin-right: -20px;
}

/* ---------------- CONTAINER ---------------- */
.container {
  position: relative;
  z-index: 2;
  padding-top: 100px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  width: 95%;
  max-width: 1400px;
  margin: 0 auto;
  gap: 50px;
  color: white;
  font-family: 'Poppins', sans-serif;
}

/* ---------------- LEFT SIDE ---------------- */
.left-side {
  display: flex;
  flex-direction: column;
  gap: 25px;
  flex: 1.5;
}

/* FORM STYLING */
.booking-form {
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  padding: 20px 25px;
  border-radius: 15px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.booking-form label { font-weight: 600; font-size: 0.95rem; }
.booking-form input {
  width: 100%;
  padding: 8px 10px;
  border-radius: 8px;
  border: 1px solid #fff;
  background: rgba(255,255,255,0.2);
  color: #fff;
  font-size: 0.9rem;
}
.booking-form input::placeholder { color: rgba(255,255,255,0.7); }

/* AMENITIES */
.amenities-list {
  background: rgba(255,255,255,0.15);
  border: 2px solid rgba(255,255,255,0.3);
  padding: 15px 18px;
  border-radius: 15px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.5);
}
.amenities-list label {
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  font-weight: 600;
  font-size: 0.9rem;
}

/* ---------------- RIGHT SIDE ---------------- */
.right-side {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
  flex: 1;
  align-items: center;
}

/* NEXT & CONFIRM BUTTONS */
.next-button  {
  width: 100%;
  margin-bottom: 10px;
}
.next-button button {
  width: 100%;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.8);
  color: #8b6d4d;
  font-family: 'Poppins', sans-serif;
  transition: all 0.3s ease;
}
.next-button button:hover {
  background: #d2b48c;
  color: white;
  transform: scale(1.02);
}

/* ---------------- SUMMARY ---------------- */
.summary {
  background: rgba(0,0,0,0.7);
  border: 2px solid #f5deb3;
  padding: 15px 18px;
  border-radius: 15px;
  text-align: left;
  width: 100%;
  box-shadow: 0 6px 15px rgba(0,0,0,0.7);
  display: none;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.4s ease, transform 0.3s ease;
}
.summary.show {
  display: block;
  opacity: 1;
  transform: translateY(0);
}
.summary h2 {
  text-align: center;
  margin-bottom: 10px;
  font-family: 'Playfair Display', serif;
  color: #f5deb3;
  font-size: 1.2rem;
}
.summary p { margin: 4px 0; font-size: 0.95rem; }

.confirm-button {
  width: 100%;
  margin-top: 30px; /* moves the button further down */
}
.confirm-button button {
  width: 100%;
  padding: 14px;
  font-size: 14px;
  font-weight: 600;
  border-radius: 20px;
  border: none;
  cursor: pointer;
  background: rgba(255,255,255,0.8);
  color: #8b6d4d;
  font-family: 'Poppins', sans-serif;
  transition: all 0.3s ease;
}
.confirm-button button:hover {
  background: #d2b48c;
  color: white;
  transform: scale(1.02);
}

/* ---------------- RESPONSIVE ---------------- */
@media (max-width: 1024px) {
  .container { flex-direction: column; align-items: center; width: 95%; gap: 20px; }
  .left-side, .right-side { flex: unset; width: 90%; }
  .next-button button, .confirm-button button { width: 100%; }
}
</style>
</head>
<body>

<!-- BACKGROUND VIDEO -->
<video class="bg-video" autoplay muted loop playsinline>
  <source src="resort-video.mp4" type="video/mp4">
</video>

<!-- NAVBAR -->
<header class="navbar">
  <nav class="navbar-container">
     <img src="logo.png" class="ilogo">
    <span class="logo">Luna Vista Resort</span>
    <a href="index.html">Home</a>
    <a href="rooms.html">Rooms</a>
  </nav>
</header>

<div class="container">
  <!-- LEFT SIDE: FORM + AMENITIES -->
  <div class="left-side">
    <div class="booking-form">
      <label>Selected Room</label>
      <input type="text" id="roomSelectedInput" placeholder="Room will show here" readonly>

      <label>Check-in Date</label>
      <input type="date" id="checkIn">

      <label>Check-out Date</label>
      <input type="date" id="checkOut">

      <label>Number of Guests</label>
      <input type="number" id="guests" min="1" value="1">
    </div>

    <div class="amenities-list">
      <label><input type="checkbox" value="Breakfast"> Breakfast</label>
      <label><input type="checkbox" value="Spa"> Spa Access</label>
      <label><input type="checkbox" value="Airport Pickup"> Airport Pickup</label>
      <label><input type="checkbox" value="Extra Bed"> Extra Bed</label>
    </div>
  </div>

  <!-- RIGHT SIDE: SHOW ITINERARY -->
  <div class="right-side">
    <div class="next-button">
      <button id="showItinerary">Finalize Booking</button>
    </div>
    <div class="summary" id="itinerarySummary">
      <h2>Your Booking Summary</h2>
      <p id="roomText"></p>
      <p id="datesText"></p>
      <p id="guestsText"></p>
      <p id="amenitiesText"></p>
    </div>
    <div class="confirm-button">
      <button id="confirmBooking" style="display:none;">Confirm & Check In</button>
    </div>
  </div>
</div>

<script>
// Fetch selected room from query string
const params = new URLSearchParams(window.location.search);
const selectedRoom = params.get('room');
document.getElementById('roomSelectedInput').value = selectedRoom || "";

// Show itinerary summary
document.getElementById('showItinerary').addEventListener('click', () => {
  const checkIn = document.getElementById('checkIn').value;
  const checkOut = document.getElementById('checkOut').value;
  const guests = document.getElementById('guests').value;
  
  const selectedAmenities = Array.from(document.querySelectorAll('.amenities-list input:checked'))
    .map(a => a.value);

  document.getElementById('roomText').innerText = `Room: ${selectedRoom || "None"}`;
  document.getElementById('datesText').innerText = `Check-in: ${checkIn || "-"} | Check-out: ${checkOut || "-"}`;
  document.getElementById('guestsText').innerText = `Guests: ${guests}`;
  document.getElementById('amenitiesText').innerText = `Amenities: ${selectedAmenities.join(", ") || "None"}`;

  const summary = document.getElementById('itinerarySummary');
  summary.classList.add('show');

  // Show confirm button
  document.getElementById('confirmBooking').style.display = 'block';
});

// Confirm booking -> redirect to login.html
document.getElementById('confirmBooking').addEventListener('click', () => {
  window.location.href = 'luna.html';
});
</script>

</body>
</html>
