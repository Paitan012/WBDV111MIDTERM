<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickup - Velvet Crust Cakes</title>
<link rel="stylesheet" href="style.css">
<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background: url('bg1.jpg') center/cover no-repeat;
  background-size: cover;
  color:#3a2e2a;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 60px; /* Reduced vertical padding since logo adds height */
  background: var(--navbar-cream);
  height: 80px; /* Setting a fixed height prevents "jumping" */
}

.logo {
  display: flex;
  align-items: center;
}

.nav-logo-img {
  height: 50px;       /* Set height */
  width: 50px;        /* Set width same as height for a perfect circle */
  border-radius: 50%; /* This creates the circle */
  object-fit: cover;  /* Ensures the image fills the circle without stretching */
  border: 2px solid #c94c4c; /* Optional: adds a thin ring around the logo */
  background-color: white;   /* Optional: fills background if logo is transparent */
}

/* Ensure the nav-links don't get squished */
.nav-links {
  display: flex;
  align-items: center;
}

.logo a{
  color:#c94c4c;
  text-decoration:none;
  font-weight:bold;
}

.nav-links button{
  background:none;
  border:none;
  color:#3a2e2a;
  margin:0 15px;
  cursor:pointer;
  font-size:15px;
}

.nav-links button:hover{
  color:#c94c4c;
}

.nav-right button{
  margin-left:10px;
  padding:8px 18px;
  border:none;
  border-radius:20px;
  cursor:pointer;
}

.schedule-btn{
  background:#c94c4c;
  color:white;
}

/* PICKUP FORM - Glassmorphism */
.pickup-container{
  max-width:500px;
  margin:50px auto;
  background: rgba(255, 244, 230, 0.6); /* semi-transparent cream */
  backdrop-filter: blur(10px); /* glass effect */
  padding:30px;
  border-radius:20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.1);
  text-align:center;
}

.pickup-container h1{
  color: whitesmoke;
  -webkit-text-stroke: 1px black;
  margin-bottom:25px;
}

.pickup-container label{
  display:block;
  margin-top:15px;
  font-weight:bold;
}

.pickup-container input, 
.pickup-container select{
  width:100%;
  padding:10px;
  margin-top:5px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

.pickup-btn{
  margin-top:25px;
  width:100%;
  padding:12px;
  background:#fff4e6;
  color:#3a2e2a;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  transition:0.3s;
}

.pickup-btn:hover{
  background:#f5e0cc;
  transform: scale(1.05);
}

.bg1 {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: url('bg1.jpg') center/cover no-repeat;
  background-size: cover;
  opacity: 0.5; /* 0 = fully transparent, 1 = fully opaque */
  z-index: -1; 
}
</style>
</head>
<body>

<nav class="navbar">
    <div class="logo">
        <a href="index.html" style="text-decoration:none; display: flex; align-items: center; gap: 10px;">
            <img src="logo.png" alt="Velvet Crust Logo" class="nav-logo-img">
            <span style="color:#c94c4c;">Velvet Crust Cakes</span>
        </a>
    </div>

    <div class="nav-links">
        <button onclick="window.location.href='orders.html'">Orders</button>
        <button onclick="window.location.href='design.html'">Design</button>
        <button onclick="window.location.href='pickup.html'">Pickup</button>
    </div>

    <div class="nav-right">
        <button class="schedule-btn" onclick="window.location.href='schedule.html'">Schedule</button>
        <button onclick="alert('Login not implemented')">Login</button>
    </div>
</nav>

<!-- PICKUP FORM -->
<div class="pickup-container">
  <h1>Schedule Your Pickup</h1>
  <form id="pickupForm">
    <label for="pickupDate">Pickup Date</label>
    <input type="date" id="pickupDate" required>

    <label for="pickupTime">Pickup Time</label>
    <select id="pickupTime" required>
      <option value="">Select time</option>
      <option value="09:00 AM">09:00 AM</option>
      <option value="11:00 AM">11:00 AM</option>
      <option value="01:00 PM">01:00 PM</option>
      <option value="03:00 PM">03:00 PM</option>
      <option value="05:00 PM">05:00 PM</option>
    </select>

    <button type="submit" class="pickup-btn">Confirm Pickup</button>
  </form>
  
  <!-- Notification message -->
  <p id="pickupNotification" style="display:none; color:green; font-weight:bold; margin-top:15px;">Your pickup request has been sent!</p>
</div>

<script>
document.getElementById('pickupForm').addEventListener('submit', function(e){
    e.preventDefault();
    const date = document.getElementById('pickupDate').value;
    const time = document.getElementById('pickupTime').value;

    if(!date || !time){
        alert("Please select a date and time for pickup.");
        return;
    }

    // Show notification instead of alert
    const notification = document.getElementById('pickupNotification');
    notification.style.display = 'block';

    // Hide notification after 4 seconds
    setTimeout(() => { notification.style.display = 'none'; }, 4000);

    // Reset form
    this.reset();
});
</script>

</body>
</html>
