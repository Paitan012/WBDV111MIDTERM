<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarPortal | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
    :root {
        --main-green: #1b5e20;
        --hover-green: #2e7d32;
        --text-light: #e8f5e9;
    }

    /* GLOBAL RESET */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Patrick Hand', cursive;
    }

    body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        color: #4b3c2a;
        background: url('bg.jpg') no-repeat center center fixed;
        background-size: cover;
        position: relative;
    }

    /* Overlay fix: ensure it doesn't overflow */
    body::before {
        content: "";
        position: fixed; /* Changed to fixed so it stays behind content */
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.3);
        z-index: 0;
    }

    /* HEADER FIX: Space-between ensures Logo is left and Nav is right */
    header {
        display: flex;
        justify-content: space-between; 
        align-items: center;
        padding: 10px 30px;
        background: var(--main-green);
        color: var(--text-light);
        box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        z-index: 10;
    }

    .logo-container {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .nav-logo {
        width: 45px;
        height: 45px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--text-light);
        background-color: white;
    }

    nav {
        display: flex;
        gap: 15px;
    }

    nav a {
        text-decoration: none;
        color: var(--text-light);
        font-weight: bold;
        padding: 8px 15px;
        border-radius: 6px;
        transition: 0.2s;
    }

    nav a:hover {
        background: var(--hover-green);
    }

    /* MAIN CONTENT */
    main {
        flex: 1;
        padding: 40px 20px;
        z-index: 1;
        max-width: 800px;
        margin: 0 auto;
        width: 100%;
    }

    h1 {
        font-size: 32px;
        margin-bottom: 20px;
        color: #fff;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        text-align: center;
    }

    /* CARDS */
    .profile-card, .courses-box {
        background: linear-gradient(to bottom, #fffdf5, #f9f3e6);
        border: 2px dashed #22814d;
        border-radius: 15px;
        padding: 25px;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        margin-bottom: 30px;
    }

    /* PROFILE IMAGE */
    #profileImageWrapper {
        width: 120px;
        height: 120px;
        margin: 0 auto 15px;
        border-radius: 50%;
        background: #eee;
        position: relative;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: pointer;
        border: 3px solid #22814d;
    }

    #profileImage {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    #plusIcon {
        position: absolute;
        font-size: 40px;
        color: #22814d;
        z-index: 2;
    }

    /* COURSE LISTING */
    .course-item {
        padding: 12px;
        border-bottom: 1px dashed #ccc;
        display: flex;
        justify-content: space-between;
        align-items: center;
    }

    .drop-btn {
        background: #c94c4c;
        color: white;
        border: none;
        padding: 5px 12px;
        border-radius: 5px;
        cursor: pointer;
    }

    .total {
        font-size: 20px;
        font-weight: bold;
        margin-top: 20px;
        text-align: right;
    }

    .pay-btn {
        background: #4caf50;
        color: white;
        border: none;
        padding: 12px 25px;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        float: right;
        margin-top: 10px;
    }

    footer {
        padding: 15px;
        background: #fff8f0;
        text-align: center;
        border-top: 2px solid #d6c1a2;
        z-index: 1;
    }
</style>
</head>

<body>

<header>
    <div class="logo-container">
        <img src="logo.png" alt="Logo" class="nav-logo">
        <h2>ScholarPortal</h2>
    </div>
    <nav>
        <a href="index.html">Register</a>
    <a href="index1.html">Courses</a>
        <a href="profile.html">Profile</a>
        <a href="transcript.html">Transcript</a>
    </nav>
</header>

<main>
    <h1>Student Profile</h1>

    <div class="profile-card">
        <div id="profileImageWrapper">
            <span id="plusIcon">+</span>
            <img id="profileImage" src="" style="display:none">
        </div>
        <input type="file" id="imageInput" accept="image/*" style="display:none">

        <div style="text-align: center; line-height: 1.6;">
            <p><strong>Name:</strong> <span id="displayName"></span></p>
            <p><strong>Student ID:</strong> <span id="displayID"></span></p>
            <p><strong>Department:</strong> Computer Studies</p>
        </div>
    </div>

    <div class="courses-box">
        <h2>Selected Courses</h2>
        <div id="courseList"></div>
        <p class="total" id="totalFees"></p>
        <button class="pay-btn" id="payBtn" onclick="payNow()">Secure Payment</button>
        <div style="clear:both"></div>
    </div>
</main>

<footer>ScholarPortal &copy; 2026</footer>

<script>
    const courseList = document.getElementById("courseList");
    const totalFees = document.getElementById("totalFees");
    const payBtn = document.getElementById("payBtn");

    let selectedCourses = JSON.parse(localStorage.getItem("courses")) || [];
    let paidCourses = JSON.parse(localStorage.getItem("paidCourses")) || [];

    function renderCourses() {
        courseList.innerHTML = "";
        let total = 0;
        
        // Show unpaid courses only
        if (selectedCourses.length === 0) {
            courseList.innerHTML = "<p style='text-align:center; color:#888;'>No courses selected.</p>";
            payBtn.style.display = "none";
        } else {
            payBtn.style.display = "block";
            selectedCourses.forEach((course, index) => {
                total += course.fee;
                const div = document.createElement("div");
                div.className = "course-item";
                div.innerHTML = `
                    <span>${course.name} (₱${course.fee})</span>
                    <button class="drop-btn" onclick="dropCourse(${index})">Drop</button>
                `;
                courseList.appendChild(div);
            });
        }
        totalFees.textContent = "Balance Due: ₱" + total;
    }

    window.dropCourse = function(index) {
        selectedCourses.splice(index, 1);
        localStorage.setItem("courses", JSON.stringify(selectedCourses));
        renderCourses();
    }

    window.payNow = function() {
        if(selectedCourses.length === 0) return;
        
        // Move to paid
        selectedCourses.forEach(c => {
            paidCourses.push({...c, grade: "Pending", status: "Enrolled"});
        });
        
        localStorage.setItem("paidCourses", JSON.stringify(paidCourses));
        localStorage.removeItem("courses");
        selectedCourses = [];
        
        alert("Payment Processed Successfully!");
        renderCourses();
    }

    // Profile Image Logic
    const profileWrapper = document.getElementById("profileImageWrapper");
    const profileImg = document.getElementById("profileImage");
    const plus = document.getElementById("plusIcon");
    const fileInput = document.getElementById("imageInput");

    function loadImg() {
        const saved = localStorage.getItem("profileImage");
        if(saved) {
            profileImg.src = saved;
            profileImg.style.display = "block";
            plus.style.display = "none";
        }
    }

    profileWrapper.onclick = () => fileInput.click();
    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if(file) {
            const reader = new FileReader();
            reader.onload = () => {
                localStorage.setItem("profileImage", reader.result);
                loadImg();
            };
            reader.readAsDataURL(file);
        }
    };

    document.getElementById("displayName").textContent = localStorage.getItem("studentName") || "Juan Dela Cruz";
    document.getElementById("displayID").textContent = localStorage.getItem("studentID") || "2024-0001";

    loadImg();
    renderCourses();
</script>

</body>
</html>
