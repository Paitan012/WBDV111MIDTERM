<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ScholarPortal | Transcript</title>

<!-- Playful font for header/nav -->
<link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

<style>
:root {
  --main-red: #c94c4c;
  --cream: #fff4e6;
  --soft-brown: #3a2e2a;
  --navbar-cream: #fff0dc;
}/* Container for the logo and title */
.logo-container {
  display: flex;
  align-items: center; /* Centers logo and text vertically */
  gap: 15px;          /* Adds space between logo and text */
}

/* The Circular Logo */
.nav-logo {
  width: 50px;
  height: 50px;
  border-radius: 50%;      /* Creates the circle */
  object-fit: cover;       /* Ensures the image fills the circle */
  border: 2px solid #e8f5e9; /* Light border to match the header text */
  background-color: white; /* Fallback for transparent PNGs */
}

/* Optional: Slight hover effect on logo */
.nav-logo:hover {
  transform: scale(1.05);
  transition: 0.2s;
}

/* GLOBAL RESET */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background: linear-gradient(135deg, #fdf6e3, #f0e6d2);
  display:flex;
  flex-direction:column;
  min-height:100vh;
  color:#4b3c2a;
 background: url('bg.jpg') no-repeat center center; /* use your image file */
  background-size: cover; /* make sure it covers the whole screen */
}

    body::before {
  content: "";
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3); /* adjust the 0.3 to make it lighter/darker */
  z-index: 0;
}

/* HEADER */
header{
  background:#1b5e20;
  color:#e8f5e9;
  padding:15px 30px;
  box-shadow:0 4px 8px rgba(0,0,0,0.1);
  z-index: 10;
}

nav{
  display:flex;
  align-items:center;
  justify-content:space-between;
 font-family: 'Patrick Hand', cursive;
}

nav h2{
  font-size:24px;
}

/* Navbar links */
.nav-links{
  display:flex;
  gap:25px; /* increased gap for better spacing */
  align-items:center;
}

.nav-links a{
  text-decoration:none;
  color:#e8f5e9;
  font-weight:bold;
  padding:2px 0; /* just a little vertical padding */
  background:none;
}

.nav-links button{
  text-decoration:none;
  color:#e8f5e9;
  font-weight:bold;
  padding:6px 12px;
  border-radius:6px;
  background:#2e7d32;
  border:none;
  cursor:pointer;
  transition:0.2s;
}

.nav-links button:hover{
  background:#388e3c;
}

/* MAIN & PAPER */
main{
  flex:1;
  display:flex;
  justify-content:center;
  padding:30px;
  z-index: 10;
}

.transcript-paper{
  background: linear-gradient(to bottom, #fffdf5, #f9f3e6);
  width:800px;
  padding:40px 50px;
  border-radius:12px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  border:2px dashed #22814d;
  transition: transform 0.2s, box-shadow 0.2s;
  font-family: "Times New Roman", Times, serif; /* Formal font inside paper */
}

.transcript-paper:hover{
  transform: translateY(-4px);
  box-shadow:0 12px 22px rgba(0,0,0,0.15);
}

h1{
  text-align:center;
  margin-bottom:30px;
}

.info{
  margin-bottom:30px;
}

.info p{
  margin:5px 0;
  font-weight:bold;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  font-weight:bold;
}

th, td{
  border:1px solid #4b3c2a;
  padding:10px;
  text-align:center;
}

th{
  background:#f0e6d2;
}

/* FOOTER */
footer{
  text-align:center;
  padding:15px;
  background:#fff8f0;
  border-top:1px solid #d6c1a2;
  color:#6b4f2a;
  font-size:14px;
  margin-top:auto;
}

/* PRINT STYLE */
@media print {
  header, footer{
    display:none;
  }

  body{
    background:white;
  }

  .transcript-paper{
    box-shadow:none;
    width:100%;
    border-radius:0;
    border:none;
  }
}
</style>
</head>

<body>

<header>
  <div class="logo-container">
    <img src="logo.png" alt="ScholarPortal Logo" class="nav-logo">
    <h2>ScholarPortal</h2>
  </div>
  
  <nav>
    <a href="index.html">Register</a>
    <a href="index1.html">Courses</a>
    <a href="profile.html">Profile</a>
    <a href="transcript.html">Transcript</a>
  </nav>
</header>

<main>
  <div class="transcript-paper">
    <h1>Official Transcript</h1>

    <div class="info">
      <p><strong>Name:</strong> <span id="studentName"></span></p>
      <p><strong>ID:</strong> <span id="studentID"></span></p>
      <p><strong>Department:</strong> Computer Studies</p>
    </div>

    <table>
      <thead>
        <tr>
          <th>Code</th>
          <th>Course</th>
          <th>Grade</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="transcriptBody"></tbody>
    </table>

    <p style="text-align:center; margin-top:20px; font-size:14px;">
      This is a digitally generated transcript.
    </p>
  </div>
</main>

<footer>
  ScholarPortal &copy; 2026
</footer>

<script>
// Student info
document.getElementById("studentName").textContent =
  localStorage.getItem("studentName") || "Student Name";

document.getElementById("studentID").textContent =
  localStorage.getItem("studentID") || "XXXX";

// Courses
const paidCourses = JSON.parse(localStorage.getItem("paidCourses")) || [];
const tbody = document.getElementById("transcriptBody");

if(paidCourses.length === 0){
  tbody.innerHTML = "<tr><td colspan='4' style='text-align:center;'>No completed courses yet.</td></tr>";
}else{
  paidCourses.forEach(course => {
    const row = document.createElement("tr");
    row.innerHTML = `
      <td>${course.code}</td>
      <td>${course.name}</td>
      <td>${course.grade || "Pending"}</td>
      <td>Enrolled</td>
    `;
    tbody.appendChild(row);
  });
}
</script>

</body>
</html>
