<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ScholarPortal | Login / Register</title>

  <!-- Google Font for Notebook/Handwritten Style -->
  <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Patrick Hand', cursive;
    }

    body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: url('rbg.jfif') no-repeat center center; /* use your image file */
  background-size: cover; /* make sure it covers the whole screen */
}

    body::before {
  content: "";
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.3); /* adjust the 0.3 to make it lighter/darker */
  z-index: 0;
}

    .login-container{
      width:360px;
      background:#f9fff8;
      padding:30px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      text-align:center;
      border:1px solid #d6cfc2;
      position:relative;
    }

    h1{
      margin-bottom:20px;
      color:#3e3a36;
      font-size:28px;
    }

    label{
      display:block;
      text-align:left;
      margin-top:12px;
      font-size:14px;
      color:#5c554f;
    }

    input{
      width:100%;
      padding:10px;
      margin-top:5px;
      border:1px solid #c9c1b4;
      border-radius:6px;
      background:#fffdf8;
      font-family: 'Patrick Hand', cursive;
      font-size:14px;
    }

    button{
      width:100%;
      margin-top:20px;
      padding:12px;
      background:#9af079;
      border:2px dashed #8b6f47;
      border-radius:6px;
      font-weight:bold;
      cursor:pointer;
      font-family: 'Patrick Hand', cursive;
      font-size:16px;
      transition:0.2s;
    }

    button:hover{
      background:#f3e9d2;
    }

    p{
      margin-top:15px;
      color:#5c554f;
      font-size:14px;
      font-family: 'Patrick Hand', cursive;
    }

    a{
      color:#6b4f2a;
      font-weight:bold;
      text-decoration:none;
      font-family: 'Patrick Hand', cursive;
    }

    /* FOOTER */
    footer{
      margin-top:20px;
      font-size:13px;
      color:#5c554f;
      text-align:center;
      padding:15px 20px;
      background:#fff8e7;
      border-radius:8px;
      border:1px solid #d6cfc2;
      max-width:360px;
      box-shadow:0 5px 12px rgba(0,0,0,0.08);
      font-family: 'Patrick Hand', cursive;
      z-index: 1;
    }

    footer span{
      font-weight:bold;
      font-size:14px;
      color:#6b4f2a;
    }

    /* Logo Styling for Login Page */
.login-logo {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid #9af079; /* Matches your button color */
  background-color: white;
  margin-bottom: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  display: inline-block;
}

/* Ensure the container stacks everything correctly */
.login-container {
  z-index: 1; /* Keeps it above the background overlay */
}
  </style>
</head>

<body>
  <div class="login-container">
    <img src="logo.png" alt="ScholarPortal Logo" class="login-logo">
    <h1>Welcome to ScholarPortal</h1>

    <form id="loginForm">
      <label for="studentName">Full Name</label>
      <input type="text" id="name" placeholder="Enter Full Name" required>

      <label for="studentID">Student ID</label>
      <input type="text" id="studentID" placeholder="Enter Student ID" required>

      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter Password" required>

      <button type="submit">LOGIN</button>
    </form>

    <p>Don't have an account?
      <a href="#">Register now</a>
    </p>
  </div>

  <footer>
    Are you one of our <span>Scholar Students</span>? Join the journey and start managing your courses today!
  </footer>

  <script>
    document.getElementById("loginForm").addEventListener("submit", function(e){
      e.preventDefault();

      const name = document.getElementById("name").value;
      const studentID = document.getElementById("studentID").value;

      if(name && studentID){
        localStorage.setItem("studentName", name);
        localStorage.setItem("studentID", studentID);

        alert("Login successful! Redirecting to Courses...");
        window.location.href = "index1.html";
      } else {
        alert("Please fill in all fields.");
      }
    });
  </script>
</body>
</html>
